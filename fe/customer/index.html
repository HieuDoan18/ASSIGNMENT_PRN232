<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - Hotel Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <div class="glass-header">
        <h2>Hotel Management - Customer Portal</h2>
        <div>
            <span id="userNameDisplay" class="text-muted" style="margin-right: 15px;">Welcome!</span>
            <button class="btn btn-secondary" id="logoutBtn">Logout</button>
        </div>
    </div>

    <div class="dashboard-layout">
        <!-- Sidebar Navigation -->
        <div class="sidebar glass-panel" style="border-radius: 0; border-top: none; border-bottom: none; border-left: none;">
            <a href="#" class="nav-item active" data-target="roomsSection">Book a Room</a>
            <a href="#" class="nav-item" data-target="bookingsSection">My Bookings</a>
            <a href="#" class="nav-item" data-target="profileSection">Profile</a>
        </div>

        <!-- Main Content Area -->
        <div class="container" style="max-height: calc(100vh - 70px); overflow-y: auto;">
            
            <!-- Rooms Section -->
            <section id="roomsSection" class="glass-panel" style="padding: 2rem; margin-bottom: 2rem;">
                <h3>Available Rooms</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 1.5rem;">
                    <div class="form-group" style="flex: 1; margin: 0;">
                        <input type="date" id="searchCheckIn" placeholder="Check-In">
                    </div>
                    <div class="form-group" style="flex: 1; margin: 0;">
                        <input type="date" id="searchCheckOut" placeholder="Check-Out">
                    </div>
                    <button class="btn btn-primary" id="searchRoomsBtn">Search</button>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Room No</th>
                                <th>Type</th>
                                <th>Price/Night</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="roomsTableBody">
                            <tr><td colspan="5" class="text-center">Loading rooms...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Bookings Section -->
            <section id="bookingsSection" class="glass-panel hidden" style="padding: 2rem; margin-bottom: 2rem;">
                <h3>My Bookings</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Room Number</th>
                                <th>Dates</th>
                                <th>Total Price</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="bookingsTableBody">
                            <tr><td colspan="6" class="text-center">Loading bookings...</td></tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- Services & Requests Modal placeholder -->
                <div id="bookingDetailsContainer" class="mt-4 hidden p-4" style="border-top: 1px solid var(--surface-border); padding-top: 1rem;">
                    <h4 id="detailsTitle">Manage Booking #</h4>
                    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                        <select id="serviceSelect" class="form-group" style="flex: 1; margin: 0;"></select>
                        <input type="number" id="serviceQty" value="1" min="1" class="form-group" style="width: 80px; margin: 0;">
                        <button class="btn btn-secondary" id="addServiceBtn">Add Service</button>
                    </div>
                    <div style="margin-top: 1rem;">
                        <button class="btn btn-danger" id="cancelBookingBtn">Cancel Booking</button>
                    </div>
                </div>
            </section>

            <!-- Profile Section -->
            <section id="profileSection" class="glass-panel hidden" style="padding: 2rem; margin-bottom: 2rem;">
                <h3>My Profile</h3>
                <div id="profileAlert" class="alert"></div>
                
                <div style="display: flex; gap: 2rem;">
                    <!-- Update Info Form -->
                    <form id="profileForm" style="flex: 1;">
                        <div class="form-group text-center">
                            <img id="avatarDisplay" src="https://via.placeholder.com/100" alt="Avatar" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 2px solid var(--primary-color);">
                        </div>
                        <div class="form-group">
                            <label>Avatar URL</label>
                            <input type="url" id="profAvatar" placeholder="https://example.com/avatar.jpg">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="text" id="profEmail" disabled>
                        </div>
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="profFullName" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Update Profile</button>
                    </form>

                    <!-- Change Password Form -->
                    <form id="passwordForm" style="flex: 1;">
                        <h4>Change Password</h4>
                        <div id="passwordAlert" class="alert"></div>
                        <div class="form-group">
                            <label>Current Password</label>
                            <input type="password" id="currentPassword" required>
                        </div>
                        <div class="form-group">
                            <label>New Password</label>
                            <input type="password" id="newPassword" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label>Confirm Password</label>
                            <input type="password" id="confirmPassword" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Change Password</button>

                        <!-- Removed Forgot Password section relative to user request -->
                    </form>
                </div>
            </section>

        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/api.js"></script>
    <script src="app.js"></script>
</body>
</html>
